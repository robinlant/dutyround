name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:
    inputs:
      tag:
        description: SemVer tag to release, for example v1.2.3
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ !contains(env.RELEASE_TAG, '-') }}
            type=sha,prefix=
            type=raw,value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
          labels: |
            org.opencontainers.image.title=DutyRound
            org.opencontainers.image.description=A self-hosted duty management platform for teams.
            org.opencontainers.image.vendor=robinlant
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.documentation=https://github.com/${{ env.IMAGE_NAME }}#readme

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release body
        id: body
        run: |
          TAG="${RELEASE_TAG}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          {
            echo 'content<<EOF'
            echo '## Container image'
            echo ''
            echo 'Pull this release:'
            echo ''
            echo '```bash'
            echo "docker pull ${IMAGE}:${TAG}"
            echo '```'
            echo ''
            if [[ ! "$TAG" == *-* ]]; then
              echo 'The `latest` tag also points to this release:'
              echo ''
              echo '```bash'
              echo "docker pull ${IMAGE}:latest"
              echo '```'
              echo ''
            fi
            echo 'Supported platforms: `linux/amd64`, `linux/arm64`.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: DutyRound ${{ env.RELEASE_TAG }}
          body: ${{ steps.body.outputs.content }}
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
